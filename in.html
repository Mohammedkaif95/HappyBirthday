<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Birthday Surprise Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* ========== [STYLES EXACTLY AS ORIGINAL - KEPT INTACT] ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff4d8d;
            --secondary: #6a11cb;
            --accent: #ffd166;
            --light: #fff9f2;
            --dark: #2d3047;
            --success: #4cd964;
            --warning: #ff9500;
            --info: #5ac8fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .birthday-title {
            font-family: 'Fredoka One', cursive;
            font-size: 4.5rem;
            background: linear-gradient(45deg, var(--primary), var(--accent), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255, 77, 141, 0.5)); }
            100% { filter: drop-shadow(0 0 20px rgba(255, 77, 141, 0.8)); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
        }

        .progress-bar {
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background-image: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.2) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0.2) 75%,
                transparent 75%,
                transparent
            );
            background-size: 20px 20px;
            animation: progressShine 1s linear infinite;
        }

        @keyframes progressShine {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        .progress-text {
            text-align: right;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .tasks-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }

        .task-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(255, 77, 141, 0.2);
        }

        .task-card.locked {
            opacity: 0.7;
            filter: grayscale(0.5);
        }

        .task-card.completed {
            border-color: var(--success);
            background: rgba(76, 217, 100, 0.05);
        }

        .task-number {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 141, 0.4);
        }

        .task-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
        }

        .task-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: white;
        }

        .task-description {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .task-button {
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: auto;
        }

        .task-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 77, 141, 0.4);
        }

        .task-button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .task-status {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 0.9rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .task-status.completed {
            background: var(--success);
            color: white;
        }

        .task-status.locked {
            background: var(--warning);
            color: white;
        }

        .surprise-content {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            margin-top: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .surprise-content.active {
            display: block;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-surprise {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-surprise:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }

        .surprise-title {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 25px;
            text-align: center;
            font-family: 'Dancing Script', cursive;
        }

        .message-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border-left: 5px solid var(--primary);
            position: relative;
        }

        .message-box::before {
            content: '"';
            position: absolute;
            top: -30px;
            left: 20px;
            font-size: 8rem;
            color: var(--primary);
            opacity: 0.3;
            font-family: serif;
        }

        .message-text {
            font-size: 1.4rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.9);
            text-align: justify;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 30px;
        }

        .message-signature {
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--accent);
            margin-top: 20px;
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gallery-item {
            border-radius: 15px;
            overflow: hidden;
            height: 250px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .image-overlay {
            transform: translateY(0);
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 40px auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .timeline-item {
            margin-bottom: 50px;
            position: relative;
            width: 50%;
            padding: 20px 40px;
        }

        .timeline-item:nth-child(odd) {
            left: 0;
        }

        .timeline-item:nth-child(even) {
            left: 50%;
        }

        .timeline-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            top: 20px;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
        }

        .timeline-item:nth-child(odd) .timeline-content::before {
            right: -50px;
        }

        .timeline-item:nth-child(even) .timeline-content::before {
            left: -50px;
        }

        .timeline-date {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        .celebration.active {
            display: block;
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            opacity: 0;
        }

        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--firework-color);
        }

        .balloon {
            position: absolute;
            width: 60px;
            height: 80px;
            border-radius: 50%;
            bottom: -100px;
            opacity: 0;
        }

        .balloon::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 100px;
            background: rgba(255, 255, 255, 0.5);
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .final-surprise {
            text-align: center;
            padding: 60px 40px;
        }

        .final-gift {
            width: 200px;
            height: 200px;
            margin: 40px auto;
            position: relative;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .final-gift:hover {
            transform: rotate(10deg) scale(1.1);
        }

        .gift-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 20px;
            position: relative;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .gift-lid {
            width: 110%;
            height: 30%;
            background: linear-gradient(45deg, #ff2b7a, #ff6b9d);
            border-radius: 20px 20px 0 0;
            position: absolute;
            top: -15%;
            left: -5%;
            transition: top 0.5s ease;
        }

        .gift-box.open .gift-lid {
            top: -40%;
            transform: rotateX(180deg);
        }

        .gift-bow {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
        }

        .gift-bow::before, .gift-bow::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
        }

        .gift-bow::before {
            top: 10px;
            left: -40px;
            transform: rotate(-45deg);
        }

        .gift-bow::after {
            top: 10px;
            right: -40px;
            transform: rotate(45deg);
        }

        .gift-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .gift-box.open .gift-content {
            opacity: 1;
        }

        @media (max-width: 992px) {
            .tasks-container { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
            .birthday-title { font-size: 3.5rem; }
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .birthday-title { font-size: 2.8rem; }
            .tasks-container { grid-template-columns: 1fr; }
            .timeline::before { left: 30px; }
            .timeline-item { width: 100%; left: 0 !important; padding-left: 70px; padding-right: 20px; }
            .timeline-content::before { left: -40px !important; }
        }
        @media (max-width: 480px) {
            .birthday-title { font-size: 2.2rem; }
            .surprise-content { padding: 25px; }
            .message-box { padding: 25px; }
            .message-text { font-size: 1.2rem; }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .heart {
            position: absolute;
            color: var(--primary);
            font-size: 24px;
            opacity: 0;
            animation: float 15s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .instructions-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .instructions-modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, rgba(45, 48, 71, 0.95), rgba(26, 26, 46, 0.95));
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 2px solid var(--primary);
            position: relative;
            animation: modalAppear 0.5s ease;
        }
        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .modal-close:hover { color: var(--primary); }
        .modal-title {
            color: var(--accent);
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-instructions {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .modal-button {
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-button.primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }
        .modal-button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .modal-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .celebration-counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .counter-icon { font-size: 1.5rem; color: var(--accent); }
        .counter-text { font-size: 1.1rem; color: white; }
        .counter-number { font-weight: bold; color: var(--accent); font-size: 1.3rem; }
        
        /* 🥠 Fortune Cookie Styles */
        .fortune-cookie-container {
            text-align: center;
            padding: 20px;
        }
        .cookie-jar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 40px 0;
        }
        .cookie {
            width: 120px;
            height: 120px;
            background: #e3b089;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #8b5a2b;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            border: 4px solid #c49a6c;
        }
        .cookie:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 209, 102, 0.8);
        }
        .cookie.cracked {
            background: #dba875;
            border-color: #ffd166;
            box-shadow: 0 0 20px gold;
        }
        .fortune-message-area {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border-left: 6px solid var(--accent);
            font-size: 1.6rem;
            font-family: 'Dancing Script', cursive;
            color: #ffecb0;
            min-height: 150px;
        }
        .fortune-btn {
            background: linear-gradient(45deg, #ffac5e, #ff8c5a);
            border: none;
            color: #2d1b0e;
            font-weight: bold;
            padding: 14px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .fortune-btn:hover:enabled {
            transform: scale(1.08);
            box-shadow: 0 0 20px #ffbe5c;
        }
        .fortune-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="stars" id="starsContainer"></div>
    <div class="floating-hearts" id="heartsContainer"></div>
    
    <!-- Celebration Effects -->
    <div class="celebration" id="celebrationContainer"></div>
    
    <!-- Celebration Counter -->
    <div class="celebration-counter">
        <i class="fas fa-gift counter-icon"></i>
        <span class="counter-text">Surprises unlocked: </span>
        <span class="counter-number" id="completedCounter">0/8</span>
    </div>
    
    <!-- Instructions Modal -->
    <div class="instructions-modal" id="instructionsModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <h2 class="modal-title" id="modalTitle">Task Instructions</h2>
            <div class="modal-instructions" id="modalInstructions"></div>
            <div class="modal-actions">
                <button class="modal-button primary" id="startTask">Start Task</button>
                <button class="modal-button secondary" id="cancelTask">Not Now</button>
            </div>
        </div>
    </div>
    
    <!-- 🌟🌈 FIXED BACKGROUND BIRTHDAY MUSIC - MULTIPLE FORMATS & INITIATE LOAD -->
    <audio id="birthdayMusic" loop preload="auto">
        <source src="aud1.mp3" type="audio/mp3">
        <source src="aud2.mp3.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>
    
    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="birthday-title">🎂 Ultimate Birthday Surprise Journey 🎁</h1>
            <p class="subtitle">Complete each task to unlock amazing birthday surprises!</p>
            <!-- Music control with autoplay trigger -->

        // Fortune cookies variables
        let cookiesCracked = 0;
        const totalCookies = 6;
        const fortuneMessages = [
            "🍀 A wonderful birthday year is ahead of you, full of joy!",
            "🎈 An unexpected gift will bring you happiness this month.",
            "✨ Your laughter will be the music of the party.",
            "💖 Someone special is thinking of you right now.",
            "🌟 You will soon receive wonderful birthday wishes.",
            "🎂 A sweet surprise is waiting just around the corner.",
            "☀️ Your positive energy attracts amazing opportunities.",
            "🌺 Good news will arrive before the week ends.",
            "🕯️ Make a wish — the universe is listening closely.",
            "💫 Adventure awaits you in the coming year!"
        ];

        // ======================
        // INITIALIZATION
        // ======================
        
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            // 🎵 FIX: attempt to play audio after any user interaction to ensure autoplay works
            setupMusicAutoPlay();
        });
        
        function initializeApp() {
            createStars();
            createHearts();
            renderTasks();
            updateProgress();
            setupEventListeners();
        }

        // 🎶 MUSIC FIX: Force play on first click/tap anywhere or via button
        function setupMusicAutoPlay() {
            const audio = document.getElementById('birthdayMusic');
            const toggleBtn = document.getElementById('musicToggleBtn');
            const statusSpan = document.getElementById('musicStatus');
            
            if (!audio) return;
            
            // Preload
            audio.load();
            
            // Attempt to play - many browsers block autoplay, so we need user interaction
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // Autoplay worked!
                    if (toggleBtn) {
                        toggleBtn.innerHTML = '<i class="fas fa-pause"></i> Pause Music';
                        statusSpan.innerText = '(playing)';
                    }
                }).catch(() => {
                    // Autoplay blocked, show play button
                    if (toggleBtn) {
                        toggleBtn.innerHTML = '<i class="fas fa-play"></i> Play Music';
                        statusSpan.innerText = '(click to play)';
                    }
                });
            }
            
            // Manual toggle
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (audio.paused) {
                        audio.play().then(() => {
                            toggleBtn.innerHTML = '<i class="fas fa-pause"></i> Pause Music';
                            statusSpan.innerText = '(playing)';
                        }).catch(e => console.log('play failed:', e));
                    } else {
                        audio.pause();
                        toggleBtn.innerHTML = '<i class="fas fa-play"></i> Play Music';
                        statusSpan.innerText = '(paused)';
                    }
                });
            }
            
            // Also attempt to play on first body click (helps some browsers)
            document.body.addEventListener('click', function once() {
                if (audio.paused) {
                    audio.play().catch(() => {}); // silent catch
                }
                document.body.removeEventListener('click', once);
            }, { once: true });
        }
        
        // ======================
        // BACKGROUND EFFECTS
        // ======================
        
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.opacity = Math.random() * 0.5 + 0.5;
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                container.appendChild(star);
            }
        }
        
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                heart.style.animationDelay = Math.random() * 15 + 's';
                heart.style.opacity = Math.random() * 0.3 + 0.1;
                container.appendChild(heart);
            }
        }
        
        // ======================
        // TASK MANAGEMENT
        // ======================
        
        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = '';
            
            birthdayData.tasks.forEach(task => {
                const taskCard = document.createElement('div');
                taskCard.className = `task-card ${task.status}`;
                taskCard.innerHTML = `
                    <div class="task-number">${task.id}</div>
                    <div class="task-icon"><i class="${task.icon}"></i></div>
                    <h3 class="task-title">${task.title}</h3>
                    <p class="task-description">${task.description}</p>
                    <button class="task-button" ${task.status === 'locked' ? 'disabled' : ''} data-task-id="${task.id}">
                        ${task.status === 'completed' ? '<i class="fas fa-check"></i> Completed' : 
                          task.status === 'available' ? '<i class="fas fa-play"></i> Start Task' : 
                          '<i class="fas fa-lock"></i> Locked'}
                    </button>
                    <div class="task-status ${task.status}">${task.status === 'completed' ? 'Completed' : task.status === 'locked' ? 'Locked' : 'Available'}</div>
                `;
                container.appendChild(taskCard);
            });
            
            document.querySelectorAll('.task-button').forEach(button => {
                button.addEventListener('click', function() {
                    const taskId = parseInt(this.getAttribute('data-task-id'));
                    startTask(taskId);
                });
            });
        }
        
        function startTask(taskId) {
            currentTask = birthdayData.tasks.find(task => task.id === taskId);
            if (!currentTask || currentTask.status === 'locked') return;
            
            document.getElementById('modalTitle').textContent = currentTask.title;
            document.getElementById('modalInstructions').textContent = currentTask.instructions;
            document.getElementById('instructionsModal').classList.add('active');
        }
        
        function completeTask() {
            if (!currentTask) return;
            
            currentTask.status = 'completed';
            completedTasks++;
            
            const nextTask = birthdayData.tasks.find(task => task.id === currentTask.id + 1);
            if (nextTask) nextTask.status = 'available';
            
            updateProgress();
            renderTasks();
            showSurprise(currentTask.surprise);
            triggerCelebration();
            document.getElementById('instructionsModal').classList.remove('active');
        }
        
        function updateProgress() {
            const progressFill = document.getElementById('progressFill');
            const completedTasksElement = document.getElementById('completedTasks');
            const completedCounter = document.getElementById('completedCounter');
            const percentage = (completedTasks / birthdayData.tasks.length) * 100;
            progressFill.style.width = `${percentage}%`;
            completedTasksElement.textContent = completedTasks;
            completedCounter.textContent = `${completedTasks}/${birthdayData.tasks.length}`;
        }
        
        function showSurprise(surprise) {
            const contentArea = document.getElementById('surpriseContent');
            const contentInner = document.getElementById('surpriseContentInner');
            contentInner.innerHTML = `<h2 class="surprise-title">${surprise.title}</h2>${surprise.content}`;
            contentArea.classList.add('active');
            contentArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            initializeSurpriseContent();
        }
        
        function initializeSurpriseContent() {
            if (!currentTask) return;
            
            switch(currentTask.type) {
                case 'cake': setupCakeTask(); break;
                case 'fortune': setupFortuneCookieTask(); break; // 🆕 NEW FORTUNE COOKIE
                case 'wisdom': setupWisdomTask(); break;
                case 'quiz': setupQuizTask(); break;
                case 'final': setupFinalTask(); break;
            }
        }
        
        // ======================
        // NEW TASK: BIRTHDAY FORTUNE COOKIES (replaces Wish Upon a Star)
        // ======================
        function setupFortuneCookieTask() {
            cookiesCracked = 0;
            const jar = document.getElementById('cookieJar');
            if (!jar) return;
            
            jar.innerHTML = '';
            // Create 6 cookies
            for (let i = 0; i < totalCookies; i++) {
                const cookie = document.createElement('div');
                cookie.className = 'cookie';
                cookie.innerHTML = '🥠';
                cookie.dataset.index = i;
                cookie.dataset.cracked = 'false';
                cookie.addEventListener('click', function() {
                    if (cookie.dataset.cracked === 'false') {
                        crackCookie(cookie);
                    }
                });
                jar.appendChild(cookie);
            }
            
            const completeBtn = document.getElementById('fortuneCompleteBtn');
            if (completeBtn) {
                completeBtn.disabled = true;
                completeBtn.onclick = function() {
                    if (cookiesCracked >= totalCookies) {
                        // Mark task as complete
                        if (currentTask && currentTask.status === 'available') {
                            completeTask();
                        }
                    }
                };
            }
            
            const counterP = document.getElementById('cookieCounter');
            if (counterP) counterP.innerText = `Cookies cracked: 0/${totalCookies}`;
            const display = document.getElementById('fortuneDisplay');
            if (display) display.innerHTML = '🥠 Click a cookie to reveal your birthday fortune!';
        }
        
        function crackCookie(cookieEl) {
            if (cookieEl.dataset.cracked === 'true') return;
            
            cookieEl.dataset.cracked = 'true';
            cookieEl.classList.add('cracked');
            cookieEl.innerHTML = '🥠✨'; // cracked open
            
            // Increment counter
            cookiesCracked++;
            const counterP = document.getElementById('cookieCounter');
            if (counterP) counterP.innerText = `Cookies cracked: ${cookiesCracked}/${totalCookies}`;
            
            // Show random fortune
            const randomFortune = fortuneMessages[Math.floor(Math.random() * fortuneMessages.length)];
            const display = document.getElementById('fortuneDisplay');
            if (display) display.innerHTML = `✨ "${randomFortune}" ✨`;
            
            // Enable complete button if all cookies cracked
            if (cookiesCracked >= totalCookies) {
                const completeBtn = document.getElementById('fortuneCompleteBtn');
                if (completeBtn) {
                    completeBtn.disabled = false;
                    completeBtn.innerHTML = '<i class="fas fa-check-circle"></i> All Fortunes Revealed! Complete Task';
                }
                // Trigger mini celebration
                triggerCelebration();
            }
        }
        
        // ======================
        // OTHER TASK SETUP (CAKE, WISDOM, QUIZ, FINAL)
        // ======================
        
        function setupCakeTask() {
            const blowButton = document.getElementById('blowCandles');
            const wishMessage = document.getElementById('wishMessage');
            if (!blowButton) return;
            blowButton.addEventListener('click', function() {
                const flames = ['flame1','flame2','flame3'];
                flames.forEach((f,idx) => { setTimeout(() => { const el = document.getElementById(f); if(el) el.style.animation = 'blowOut 0.5s forwards'; }, idx*300); });
                setTimeout(() => { if(wishMessage) { wishMessage.textContent = "Your wish has been sent to the universe! It will come true! ✨"; wishMessage.style.opacity = '1'; } 
                    blowButton.innerHTML = '<i class="fas fa-check"></i> Wish Made!'; blowButton.style.background = 'linear-gradient(45deg, #4cd964, #2ecc71)'; blowButton.disabled = true; }, 1000);
            });
        }
        
        function setupWisdomTask() {
            const gen = document.getElementById('generateWish');
            const rw = document.getElementById('randomWish');
            if (!gen) return;
            const addWishes = ["May your birthday be sprinkled with fun and laughter!","Wishing you a day filled with happy moments and treasured memories.","May all your birthday wishes come true, today and always.","Here's to a year filled with new adventures and exciting opportunities!","May your special day be as incredible as you are.","Wishing you health, happiness, and prosperity in the coming year.","May your birthday be the beginning of your most amazing year yet!","Sending you smiles for every moment of your special day.","Hope your birthday is as sweet as cake and as bright as candles!","May your birthday be filled with the love of family and friends."];
            gen.addEventListener('click', function() {
                if (rw) { rw.textContent = addWishes[Math.floor(Math.random() * addWishes.length)]; rw.style.display = 'block'; rw.style.opacity = '0'; setTimeout(() => { rw.style.transition = 'opacity 0.5s ease'; rw.style.opacity = '1'; }, 10); }
            });
        }
        
        function setupQuizTask() {
            currentQuizQuestion = 0; quizScore = 0; document.getElementById('quizScore').textContent = '0';
            loadQuizQuestion();
            const nextButton = document.getElementById('nextQuestion');
            if (nextButton) nextButton.addEventListener('click', function() { currentQuizQuestion++; if (currentQuizQuestion < quizData.length) loadQuizQuestion(); else showQuizResults(); });
        }
        
        function loadQuizQuestion() {
            const qd = quizData[currentQuizQuestion];
            document.getElementById('currentQuestion').textContent = currentQuizQuestion + 1;
            document.getElementById('quizQuestion').textContent = qd.question;
            document.getElementById('quizScore').textContent = quizScore;
            const opts = document.getElementById('quizOptions'); opts.innerHTML = '';
            qd.options.forEach((opt, idx) => {
                const btn = document.createElement('button'); btn.className = 'quiz-option'; btn.textContent = opt; btn.setAttribute('data-correct', idx === qd.correct);
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.quiz-option').forEach(b => { b.disabled = true; if (b.getAttribute('data-correct')==='true') b.classList.add('correct'); else b.classList.add('incorrect'); });
                    if (idx === qd.correct) { quizScore++; document.getElementById('quizScore').textContent = quizScore; }
                    document.getElementById('nextQuestion').style.display = 'block';
                });
                opts.appendChild(btn);
            });
            document.getElementById('nextQuestion').style.display = 'none';
            document.getElementById('quizResult').style.display = 'none';
        }
        
        function showQuizResults() {
            const rc = document.getElementById('quizResult'); if (!rc) return;
            let html = '<h3 style="color: var(--accent); margin-bottom: 15px;">Quiz Complete!</h3>';
            if (quizScore === quizData.length) html += '<p style="font-size: 1.2rem;">Perfect score! You\'re a birthday expert! 🎉</p>';
            else if (quizScore >= quizData.length*0.7) html += '<p style="font-size: 1.2rem;">Great job! You know your birthday trivia! 👍</p>';
            else html += '<p style="font-size: 1.2rem;">Good effort! You learned something new today! 🌟</p>';
            html += `<p style="font-size: 1.2rem;">Your score: ${quizScore} out of ${quizData.length}</p>`;
            rc.innerHTML = html; rc.style.display = 'block';
        }
        
        function setupFinalTask() {
            const finalGift = document.getElementById('finalGift');
            const celebrateBtn = document.getElementById('celebrateBtn');
            if (finalGift) finalGift.addEventListener('click', function() { this.querySelector('.gift-box').classList.toggle('open'); if (this.querySelector('.gift-box').classList.contains('open')) { setTimeout(() => { triggerUltimateCelebration(); }, 500); } });
            if (celebrateBtn) celebrateBtn.addEventListener('click', function() { triggerUltimateCelebration(); this.innerHTML = '<i class="fas fa-party-horn"></i> Celebration in Progress!'; this.disabled = true; });
        }
        
        // ======================
        // CELEBRATION EFFECTS (unchanged)
        // ======================
        function triggerCelebration() {
            const celebration = document.getElementById('celebrationContainer');
            if (!celebration) return; celebration.classList.add('active');
            for (let i = 0; i < 100; i++) createConfetti();
            for (let i = 0; i < 10; i++) setTimeout(() => createFirework(), i * 300);
            for (let i = 0; i < 15; i++) setTimeout(() => createBalloon(), i * 200);
            setTimeout(() => { celebration.classList.remove('active'); celebration.innerHTML = ''; }, 5000);
        }
        function triggerUltimateCelebration() {
            const celebration = document.getElementById('celebrationContainer');
            if (!celebration) return; celebration.classList.add('active');
            for (let i = 0; i < 300; i++) setTimeout(() => createConfetti(), i * 10);
            for (let i = 0; i < 20; i++) setTimeout(() => { createFirework(); createFirework(); }, i * 200);
            for (let i = 0; i < 30; i++) setTimeout(() => createBalloon(), i * 100);
            setTimeout(() => { celebration.classList.remove('active'); celebration.innerHTML = ''; }, 10000);
        }
        function createConfetti() { 
            const c = document.getElementById('celebrationContainer'); if(!c) return; const e=document.createElement('div'); e.className='confetti'; e.style.backgroundColor=['#ff4d8d','#6a11cb','#ff9500','#4cd964','#5ac8fa','#ffcc00'][Math.floor(Math.random()*6)]; e.style.left=Math.random()*100+'vw'; e.style.top='-20px'; e.style.transform='rotate('+Math.random()*360+'deg)'; e.style.opacity=Math.random()*0.5+0.5; c.appendChild(e); const d=Math.random()*3000+2000, dl=Math.random()*1000; e.animate([{transform:'translate(0,0) rotate(0deg)', opacity:0},{transform:'translate('+(Math.random()*100-50)+'px, 50px) rotate(180deg)', opacity:1},{transform:'translate('+(Math.random()*100-50)+'px, 100vh) rotate(360deg)', opacity:0}], {duration:d, delay:dl, easing:'cubic-bezier(0.215, 0.610, 0.355, 1)'}); setTimeout(()=>{ if(e.parentNode) e.parentNode.removeChild(e); }, d+dl); }
        function createFirework() { 
            const c=document.getElementById('celebrationContainer'); if(!c) return; const e=document.createElement('div'); e.className='firework'; const col=['#ff4d8d','#6a11cb','#ff9500','#4cd964','#5ac8fa','#ffcc00'][Math.floor(Math.random()*6)]; e.style.setProperty('--firework-color',col); e.style.left=Math.random()*80+10+'vw'; e.style.top=Math.random()*80+10+'vh'; c.appendChild(e); e.animate([{width:'5px',height:'5px',opacity:1,boxShadow:'0 0 10px '+col},{width:'100px',height:'100px',opacity:0,boxShadow:'0 0 40px '+col}],{duration:1000,easing:'ease-out'}); setTimeout(()=>{ if(e.parentNode) e.parentNode.removeChild(e); },1000); }
        function createBalloon() { 
            const c=document.getElementById('celebrationContainer'); if(!c) return; const e=document.createElement('div'); e.className='balloon'; const col=['#ff4d8d','#6a11cb','#ff9500','#4cd964','#5ac8fa','#ffcc00'][Math.floor(Math.random()*6)]; e.style.backgroundColor=col; e.style.left=Math.random()*80+10+'vw'; c.appendChild(e); const d=Math.random()*5000+5000, dl=Math.random()*1000; e.animate([{bottom:'-100px',opacity:0},{bottom:'20px',opacity:1},{bottom:'100vh',opacity:0.7}],{duration:d,delay:dl,easing:'cubic-bezier(0.215, 0.610, 0.355, 1)'}); setTimeout(()=>{ if(e.parentNode) e.parentNode.removeChild(e); },d+dl); }
        
        // ======================
        // EVENT LISTENERS SETUP
        // ======================
        function setupEventListeners() {
            document.getElementById('startTask').addEventListener('click', completeTask);
            document.getElementById('cancelTask').addEventListener('click', function() { document.getElementById('instructionsModal').classList.remove('active'); });
            document.getElementById('closeModal').addEventListener('click', function() { document.getElementById('instructionsModal').classList.remove('active'); });
            document.getElementById('closeSurprise').addEventListener('click', function() { document.getElementById('surpriseContent').classList.remove('active'); });
            document.getElementById('instructionsModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { document.getElementById('instructionsModal').classList.remove('active'); document.getElementById('surpriseContent').classList.remove('active'); } });
        }
    </script>
</body>
</html>
